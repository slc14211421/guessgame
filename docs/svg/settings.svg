<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">设置面板 SVG 原型</title>
  <desc id="desc">设置面板展示背景色、词条颜色、出词方式、词条滚动开关、保存和退出猜词模式入口。</desc>
  <style>
    .bg{fill:#f7f4ed}.overlay{fill:#232522;opacity:.18}.panel{fill:#fffdf8;stroke:#d9d3c7}.ink{fill:#232522}.muted{fill:#6f746e}.line{stroke:#d9d3c7;stroke-width:1}.accent{fill:#2f6b57}.danger{fill:#b65345}.txt{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif}.h1{font-size:24px;font-weight:700}.h2{font-size:16px;font-weight:700}.body{font-size:14px}.small{font-size:12px}.btnText{fill:#fffdf8;font-size:16px;font-weight:700}
  </style>
  <rect class="bg" width="390" height="844"/>
  <text class="txt h1 ink" x="36" y="70">你比我猜</text>
  <rect x="36" y="130" width="318" height="72" rx="14" fill="#fffdf8" stroke="#d9d3c7"/>
  <rect x="36" y="222" width="318" height="72" rx="14" fill="#fffdf8" stroke="#d9d3c7"/>
  <rect class="overlay" width="390" height="844"/>
  <rect x="18" y="300" width="354" height="508" rx="28" class="panel"/>
  <text class="txt h1 ink" x="42" y="348">设置</text>
  <text class="txt body muted" x="42" y="375">调整猜词模式的显示样式</text>
  <line class="line" x1="42" y1="402" x2="348" y2="402"/>

  <text class="txt h2 ink" x="42" y="438">背景色</text>
  <circle cx="62" cy="474" r="18" fill="#111111"/>
  <circle cx="110" cy="474" r="18" fill="#fffdf8" stroke="#d9d3c7"/>
  <circle cx="158" cy="474" r="18" fill="#2f6b57"/>
  <circle cx="206" cy="474" r="18" fill="#b65345"/>
  <circle cx="254" cy="474" r="18" fill="#c79a2f"/>
  <circle cx="62" cy="474" r="23" fill="none" stroke="#2f6b57" stroke-width="3"/>

  <text class="txt h2 ink" x="42" y="528">词条颜色</text>
  <circle cx="62" cy="564" r="18" fill="#ffffff" stroke="#d9d3c7"/>
  <circle cx="110" cy="564" r="18" fill="#232522"/>
  <circle cx="158" cy="564" r="18" fill="#2f6b57"/>
  <circle cx="206" cy="564" r="18" fill="#c79a2f"/>
  <circle cx="62" cy="564" r="23" fill="none" stroke="#2f6b57" stroke-width="3"/>

  <text class="txt h2 ink" x="42" y="612">出词方式</text>
  <circle cx="56" cy="642" r="8" class="accent"/>
  <text class="txt body ink" x="74" y="647">顺序出词</text>
  <circle cx="178" cy="642" r="8" fill="#fffdf8" stroke="#d9d3c7" stroke-width="3"/>
  <text class="txt body muted" x="196" y="647">随机出词</text>

  <text class="txt h2 ink" x="42" y="688">词条滚动</text>
  <circle cx="56" cy="718" r="8" class="accent"/>
  <text class="txt body ink" x="74" y="723">开启滚动</text>
  <circle cx="178" cy="718" r="8" fill="#fffdf8" stroke="#d9d3c7" stroke-width="3"/>
  <text class="txt body muted" x="196" y="723">静态展示</text>

  <rect x="42" y="754" width="142" height="50" rx="14" fill="#fffdf8" stroke="#b65345"/>
  <text class="txt h2 danger" x="72" y="785">退出游戏</text>
  <rect x="204" y="754" width="144" height="50" rx="14" class="accent"/>
  <text class="txt btnText" x="260" y="785">保存</text>
</svg>
