<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">词语管理页 SVG 原型</title>
  <desc id="desc">词语管理页面展示当前分类、输入框、词语列表和删除入口。</desc>
  <style>
    .bg{fill:#f7f4ed}.surface{fill:#fffdf8;stroke:#d9d3c7}.ink{fill:#232522}.muted{fill:#6f746e}.accent{fill:#2f6b57}.soft{fill:#f0ebe1}.danger{fill:#b65345}.txt{font-family:"Microsoft YaHei","Noto Sans SC",sans-serif}.h1{font-size:26px;font-weight:700}.h2{font-size:17px;font-weight:700}.body{font-size:14px}.small{font-size:12px}.btnText{fill:#fffdf8;font-size:15px;font-weight:700}
  </style>
  <rect class="bg" width="390" height="844"/>
  <text class="txt h1 ink" x="36" y="66">词语管理</text>
  <rect x="36" y="88" width="94" height="34" rx="17" class="soft"/>
  <text class="txt body ink" x="62" y="111">成语</text>

  <rect x="36" y="150" width="224" height="48" rx="12" fill="#fffdf8" stroke="#d9d3c7"/>
  <text class="txt body muted" x="56" y="180">输入新词语</text>
  <rect x="274" y="150" width="80" height="48" rx="12" class="accent"/>
  <text class="txt btnText" x="300" y="180">添加</text>

  <text class="txt h2 ink" x="36" y="244">当前词语</text>
  <text class="txt small muted" x="299" y="244">共 3 个</text>
  <rect x="36" y="266" width="318" height="62" rx="14" class="surface"/>
  <text class="txt h2 ink" x="58" y="304">画蛇添足</text>
  <text class="txt body danger" x="300" y="304">删除</text>

  <rect x="36" y="344" width="318" height="62" rx="14" class="surface"/>
  <text class="txt h2 ink" x="58" y="382">守株待兔</text>
  <text class="txt body danger" x="300" y="382">删除</text>

  <rect x="36" y="422" width="318" height="62" rx="14" class="surface"/>
  <text class="txt h2 ink" x="58" y="460">亡羊补牢</text>
  <text class="txt body danger" x="300" y="460">删除</text>

  <rect x="36" y="610" width="318" height="104" rx="18" class="soft"/>
  <text class="txt h2 ink" x="58" y="650">空状态说明</text>
  <text class="txt body muted" x="58" y="680">当分类没有词语时，引导用户先添加词语</text>
</svg>
